name: Changelog Check

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Check CHANGELOG.md was modified
        run: |
          git diff --name-only origin/main...HEAD | grep -q "^CHANGELOG.md$" \
            || (echo "CHANGELOG.md must be updated in this PR" && exit 1)