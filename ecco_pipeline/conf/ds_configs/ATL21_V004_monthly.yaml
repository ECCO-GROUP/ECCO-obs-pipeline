ds_name: ATL21_V004_monthly # Name for dataset
ecco_variable: sea_ice # ECCO variable grouping: sea_ice, sst, sss, ssh, mass
start: "19800101T00:00:00Z" # yyyymmddThh:mm:ssZ
end: "NOW" # yyyymmddThh:mm:ssZ for specific date or "NOW" for...now

# Provider specifications
harvester_type: cmr
cmr_concept_id: C3826284331-NSIDC_CPRD
filename_date_fmt: "%Y%m%d%H%M%S" #20200701010729
filename_date_regex: '\d{14}'
provider: "data.nsidc.earthdatacloud.nasa.gov"

# Metadata
data_time_scale: "monthly" # daily or monthly
preprocessing: ATL20_V004_monthly
mapping_operation: 'nanmean'
hemi_pattern:
  north: "ATL21-01"
  south: "ATL21-02"
fields:
  - name: mean_ssha
    long_name: Monthly mean sea surface height anomalies
    standard_name: mean_ssha
    units: "meters"
    pre_transformations: [] # List of functions to call on the DataSet before transformation
    post_transformations: [] # List of functions to call on the DataArrays after transformation
  - name: mean_weighted_earth_free2mean
    long_name: Monthly mean solid earth tide free-to-mean conversion
    standard_name: solid earth tide free2mean
    units: "meters"
    pre_transformations: [] # List of functions to call on the DataSet before transformation
    post_transformations: [] # List of functions to call on the DataArrays after transformation
  - name: mean_weighted_geoid
    long_name: Monthly mean geoid
    standard_name: mean_weighted_geoid
    units: "meters"
    pre_transformations: [] # List of functions to call on the DataSet before transformation
    post_transformations: [] # List of functions to call on the DataArrays after transformation
  - name: mean_weighted_geoid_free2mean
    long_name: Monthly mean geoid free-to-mean conversion
    standard_name: mean_weighted_geoid_free2mean
    units: "meters"
    pre_transformations: [] # List of functions to call on the DataSet before transformation
    post_transformations: [] # List of functions to call on the DataArrays after transformation
  - name: mean_weighted_mss
    long_name: Monthly mean MSS
    standard_name: mean_weighted_mss
    units: "meters"
    pre_transformations: [] # List of functions to call on the DataSet before transformation
    post_transformations: [] # List of functions to call on the DataArrays after transformation
original_dataset_title: ATLAS/ICESat-2 L3B Daily and Monthly Gridded Polar Sea Surface Height Anomaly V004
original_dataset_short_name: ATL21_V004
original_dataset_url: https://nsidc.org/data/atl21/versions/4
original_dataset_reference: https://nsidc.org/sites/default/files/documents/user-guide/atl21-v004-userguide.pdf
original_dataset_doi: 10.5067/ATLAS/ATL21.004

# Transformation
t_version: 1.1 # Update this value if any changes are made to this file
data_res: 25/111 # Resolution of dataset

# Values for non split datasets (for datasets split into nh/sh, append '_nh'/'_sh')
area_extent_nh: [-3850000.0, -5350000.0, 3750000.0, 5850000.0]
area_extent_sh: [-3937500.0, -3937500.0, 3937500.0, 4337500.0]
dims_nh: [304, 448]
dims_sh: [316, 332]
proj_info_nh:
  area_id: "3411"
  area_name: "polar_stereographic"
  proj_id: "3411"
  proj4_args: "EPSG:3411"
proj_info_sh:
  area_id: "3412"
  area_name: "polar_stereographic"
  proj_id: "3412"
  proj4_args: "EPSG:3412"

notes: "" # String to include in global attributes of output files

# Aggregation
a_version: 1.0 # Update this value if any changes are made to this file
remove_nan_days_from_data: False # Remove empty days from data when aggregating
do_monthly_aggregation: False
skipna_in_mean: True # Controls skipna when calculating monthly mean