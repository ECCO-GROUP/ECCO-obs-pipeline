ds_name: NASA_SSH_REF_SIMPLE_GRID_V11 # Name for dataset
ecco_variable: ssh # ECCO variable grouping: sea_ice, sst, sss, ssh, mass
start: "19800101T00:00:00Z" # yyyymmddThh:mm:ssZ
end: "NOW" # yyyymmddThh:mm:ssZ for specific date or "NOW" for...now

# Provider specifications
harvester_type: cmr
cmr_concept_id: C4155232533-POCLOUD
filename_date_fmt: "%Y%m%d"
filename_date_regex: '\d{8}'
provider: "archive.podaac"

# Metadata
data_time_scale: "daily" # daily or monthly
fields:
  - name: ssha
    long_name: sea surface height anomaly
    standard_name: sea_surface_height_above_sea_level
    units: m
    pre_transformations: [] # List of functions to call on the DataSet before transformation
    post_transformations: ["MEaSUREs_fix_time"] # List of functions to call on the DataArrays after transformation
original_dataset_title: NASA-SSH Simple Gridded Sea Surface Height from Standardized Reference Missions Only Version 1.1
original_dataset_short_name: NASA_SSH_REF_SIMPLE_GRID_V11
original_dataset_url: https://podaac.jpl.nasa.gov/dataset/NASA_SSH_REF_SIMPLE_GRID_V11
original_dataset_reference: "https://archive.podaac.earthdata.nasa.gov/podaac-ops-cumulus-docs/web-misc/nasa-ssh/NASA-SSH_V1_1_UserGuide.pdf"
original_dataset_doi: 10.5067/NSREF-SG0V11

# Transformation
t_version: 1.0 # Update this value if any changes are made to this file
time_bounds_var: ""
transpose: False
data_res: 1/2 # Resolution of dataset

# Values for non split datasets (for datasets split into nh/sh, append '_nh'/'_sh')
area_extent: [0, 90, 360, -90] # [lon_min, lat_min, lon_max, lat_max]
dims: [720, 360] # [lon, lat]
proj_info:
  area_id: "longlat"
  area_name: "Plate Carree"
  proj_id: "EPSG:4326"
  proj4_args: "+proj=longlat +ellps=WGS84 +datum=WGS84 +no_defs"

notes: "" # String to include in global attributes of output files

# Aggregation
a_version: 1.0 # Update this value if any changes are made to this file
remove_nan_days_from_data: True # Remove empty days from data when aggregating
do_monthly_aggregation: True
skipna_in_mean: False # Controls skipna when calculating monthly mean